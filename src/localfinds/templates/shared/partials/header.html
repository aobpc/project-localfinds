<header class="site-header">
    <div class="left-header">
        <a href="{{ url_for('home') }}" class="logo-link">
            <img src="{{ url_for('static', filename='images/lflogo_banner.svg') }}" alt="LocalFinds" class="logo">
        </a>
    </div>
    
    <nav class="account-nav">
        {% if 'user_id' in session %}
        <a class="show-menu">
            {{ session.username }}
        </a>
        <div class="account-menu">
            <div class="menu-btn-container">
                <a href="{{ url_for('create_post') }}" class="menu-btn" id="nav-new-post">New Find</a>
            </div>
            <div class="menu-btn-container">
                <a href="{{ url_for('view_account', username=session['username']) }}" class="menu-btn" id="nav-username">My Account</a>
            </div>
            <div class="menu-btn-container">
                <a href="{{ url_for('logout') }}" class="menu-btn" id="nav-log-out">Log Out</a>
            </div>
        {% elif request.endpoint not in ['create_account', 'login'] %}
            <a href="{{ url_for('login') }}" class="btn" id="nav-log-in">Log In</a>
        {% endif %}
        </div>
    </nav>
</header>

<script>
    var coll = document.getElementsByClassName("show-menu");
    var i;

    for (i = 0; i < coll.length; i++) {
    coll[i].addEventListener("click", function() {
        this.classList.toggle("active");
        var content = this.nextElementSibling;
        if (content.style.display === "block") {
        content.style.display = "none";
        } else {
        content.style.display = "block";
        }
    });
    }
</script>
