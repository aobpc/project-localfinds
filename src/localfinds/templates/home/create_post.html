{% extends "base.html" %}

{% block title %}Create Post | LocalFinds{% endblock %}

{% block content %}
<form method="POST">
    <div id="post_head">
        <h1>
            <input type="text" name="subject" placeholder="Subject" required>
        </h1>
         <h3>
            <input type="text" name="address" placeholder="Address" required>
        </h3>
    </div>
    <div id="post_body">
       
        <p>
            <input type="text" name="tags" placeholder="tags, comma, separated" required>
        </p>
        <p>
            <textarea name="content" placeholder="Write your post here..." rows="6" cols="40" required></textarea>
        </p>
    </div>
    <button type="submit">Create Post</button>
</form>
{% endblock %}
