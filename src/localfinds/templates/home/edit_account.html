{% extends "base.html" %}

{% block title %}Edit Account | LocalFinds{% endblock %}

{% block content %}
{% if error %}
    <p class="error-message">{{ error }}</p>
{% endif %}
<form method="POST">
    <div id="edit_account_form">
        <h1>
            Edit Account
        </h1>
        <h1>
            <input type="text" name="username" value="{{ account.username }}" placeholder="username" required>
        </h1>
        <p>
            <input type="password" name="password" placeholder="password" required>
        </p>
    <button type="submit" class="btn">Save Changes</button>
    <a href="{{ url_for('remove_account', username=account.username) }}">Delete Account</a>
</form>
{% endblock %}
