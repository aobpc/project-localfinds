{% extends "base.html" %}

{% block title %}{{ account.username }} | LocalFinds{% endblock %}

{% block content %}
<div id="account">
    <h1>{{ account.username }}</h1>
    <p>Member since <span>{{ account.joined }}</span>.</p>
</div>
<a href="{{ url_for('edit_account', username=account.username) }}">Edit Account</a>
{% endblock %}
